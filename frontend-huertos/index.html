<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Mini-Huertos</title>
    <!-- Importamos Tailwind CSS para los estilos rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen p-8 font-sans text-gray-800">
    <div class="max-w-4xl mx-auto">
        <!-- Encabezado -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-emerald-700 tracking-tight">Mis Mini-Huertos 🌱</h1>
            <p class="text-emerald-600 mt-2">Sistema Inteligente de Gestión y Riego</p>
        </header>
        
        <!-- Formulario Principal (POST) -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-emerald-100 mb-8">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Registrar Nueva Planta</h2>
            <form id="plantaForm" class="flex flex-col md:flex-row gap-4">
                <input type="text" id="nombre" placeholder="Nombre (ej. Tomate Cherry)" class="border border-gray-300 p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-emerald-400" required>
                <input type="text" id="tipo" placeholder="Tipo (ej. Hortaliza)" class="border border-gray-300 p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-emerald-400" required>
                <button type="submit" class="bg-emerald-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-emerald-700 transition shadow-md">Sembrar</button>
            </form>
        </div>

        <!-- Inventario de Plantas (GET, PUT, DELETE) -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-emerald-100">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Mi Huerto Virtual</h2>
            <!-- Aquí JavaScript inyectará la lista de plantas -->
            <ul id="listaPlantas" class="divide-y divide-gray-100">
                <li class="text-gray-500 py-4 text-center">Cargando plantas...</li>
            </ul>
        </div>
    </div>

    <!-- Lógica de Conexión con el Backend -->
    <script>
        // La URL de tu backend en la Fase 1
        const API_URL = 'http://localhost:4000/api/plantas';

        // Función 1: GET - Obtener todas las plantas y mostrarlas
        async function cargarPlantas() {
            try {
                const respuesta = await fetch(API_URL);
                const plantas = await respuesta.json();
                const contenedorLista = document.getElementById('listaPlantas');
                
                contenedorLista.innerHTML = ''; // Limpiar la lista antes de recargar
                
                if(plantas.length === 0) {
                    contenedorLista.innerHTML = '<li class="text-gray-500 py-4 text-center">Tu huerto está vacío. ¡Siembra tu primera planta!</li>';
                    return;
                }

                plantas.forEach(planta => {
                    // Formatear el historial de riegos
                    const historialRiegos = planta.riegos.map(r => 
                        `<span class="inline-block bg-blue-50 border border-blue-200 text-blue-700 text-xs px-2 py-1 rounded-md mr-2 mt-1">
                            💧 ${r.cantidad} (${new Date(r.fecha).toLocaleDateString()})
                        </span>`
                    ).join('');

                    // Crear el elemento de la lista (Tarjeta de cada planta)
                    const li = document.createElement('li');
                    li.className = 'py-6 flex flex-col gap-3 hover:bg-gray-50 transition p-4 rounded-lg';
                    li.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${planta.nombre}</h3>
                                <span class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2 py-0.5 rounded">${planta.tipo}</span>
                                
                                <div class="mt-3">
                                    <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Historial de Riego</h4>
                                    <div class="mt-1">
                                        ${historialRiegos || '<span class="text-sm text-gray-400 italic">No se ha regado aún.</span>'}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-2">
                                <button onclick="editarPlanta('${planta._id}', '${planta.nombre}', '${planta.tipo}')" class="text-sm text-amber-600 hover:text-amber-800 font-medium text-right">✏️ Editar</button>
                                <button onclick="eliminarPlanta('${planta._id}')" class="text-sm text-red-500 hover:text-red-700 font-medium text-right">🗑️ Eliminar</button>
                            </div>
                        </div>
                        
                        <!-- Formulario miniatura para añadir riego -->
                        <div class="mt-2 flex gap-2 w-full sm:w-2/3 md:w-1/2 bg-gray-50 p-2 rounded-lg border border-gray-200">
                            <input type="text" id="riego-${planta._id}" placeholder="Ej: 200ml o 5 min" class="bg-white border border-gray-300 p-2 text-sm rounded flex-1 focus:outline-none focus:border-blue-400">
                            <button onclick="agregarRiego('${planta._id}')" class="bg-blue-500 text-white text-sm px-4 py-2 rounded hover:bg-blue-600 shadow-sm transition">Regar</button>
                        </div>
                    `;
                    contenedorLista.appendChild(li);
                });
            } catch (error) {
                console.error("Error al cargar las plantas:", error);
                document.getElementById('listaPlantas').innerHTML = '<li class="text-red-500 py-4 text-center">Error al conectar con el servidor. ¿Está encendido el backend?</li>';
            }
        }

        // Función 2: POST - Crear una nueva Planta
        document.getElementById('plantaForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue
            const nombre = document.getElementById('nombre').value;
            const tipo = document.getElementById('tipo').value;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, tipo })
            });

            document.getElementById('plantaForm').reset(); // Limpiar formulario
            cargarPlantas(); // Recargar la lista
        });

        // Función 3: PUT - Actualizar Planta
        async function editarPlanta(id, nombreActual, tipoActual) {
            // Usamos prompts simples para pedir los nuevos datos
            const nuevoNombre = prompt("Editar nombre de la planta:", nombreActual);
            const nuevoTipo = prompt("Editar tipo de la planta:", tipoActual);

            // Si el usuario no canceló y escribió algo
            if (nuevoNombre && nuevoTipo) {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nuevoNombre, tipo: nuevoTipo })
                });
                cargarPlantas();
            }
        }

        // Función 4: DELETE - Eliminar Planta
        async function eliminarPlanta(id) {
            if(confirm('¿Estás totalmente seguro de arrancar esta planta del huerto?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarPlantas();
            }
        }

        // Función 5: POST Especial - Añadir Riego
        async function agregarRiego(idPlanta) {
            const inputRiego = document.getElementById(`riego-${idPlanta}`);
            const cantidad = inputRiego.value.trim();

            if (!cantidad) return alert('Por favor ingresa cuánta agua le pusiste.');

            await fetch(`${API_URL}/${idPlanta}/riegos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cantidad })
            });

            cargarPlantas(); 
        }

        // Arrancar la aplicación pidiendo los datos al backend
        cargarPlantas();
    </script>
</body>
</html>
